name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npm run check | tee test-results.txt
        continue-on-error: true
      
      - name: Upload test results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

  deploy:
    needs: test                    # ← INDENTED properly (2 spaces)
    runs-on: self-hosted           # ← INDENTED properly (2 spaces)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download test results artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results
      
      - name: Display artifact content
        run: type test-results.txt
        shell: cmd
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
        shell: cmd
      
      - name: Ensure PM2 is installed
        run: |
          # Check if PM2 exists, install if not
          if (!(Get-Command pm2 -ErrorAction SilentlyContinue)) {
              Write-Host "PM2 not found. Installing globally..."
              npm install -g pm2
          } else {
              Write-Host "PM2 is already installed"
          }
        shell: powershell
      
      - name: Deploy application
        run: |
          # Cleanup existing process (ignore error if not found)
          pm2 delete node-app -ErrorAction SilentlyContinue
          
          # Start application
          Write-Host "Starting application with PM2..."
          pm2 start src/server.js --name node-app
          
          # Save PM2 process list
          pm2 save
          
          # Show running processes
          pm2 list
        shell: powershell