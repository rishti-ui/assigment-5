name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npm run check | tee test-results.txt
        continue-on-error: true
      
      - name: Upload test results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

  deploy:
    needs: test
    runs-on: self-hosted

    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Download test results artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results
      
      - name: Display artifact content
        run: type test-results.txt
        shell : cmd
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
      
      - name: Deploy application
        run: |
          # Cleanup existing process - PowerShell style
          pm2 delete node-app 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "No existing process to delete" }
          
          # Start application
          pm2 start src/server.js --name node-app
          
          # Save PM2 process list
          pm2 save
        shell: pwsh